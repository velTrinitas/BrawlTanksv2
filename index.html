<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Tanks — Season 2</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">

    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; background-color: #1a1a2e; 
            font-family: 'Lilita One', cursive, sans-serif; user-select: none;
        }
        body.game-cursor-hidden { cursor: none !important; }

        #uiLayer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; pointer-events: none; 
        }

        .screen {
            display: none; flex-direction: column; align-items: center;
            background: #fff; padding: 20px 40px 40px 40px;
            border-radius: 32px; border: 8px solid #2c3e50; color: #2c3e50;
            pointer-events: auto; 
            box-shadow: 0 20px 0 rgba(0,0,0,0.2), 0 25px 50px rgba(0,0,0,0.5);
            max-width: 900px; width: 90%; max-height: 90vh; overflow-y: auto;
        }
        .active-screen { display: flex; }

        h1 { 
            font-size: 4rem; margin: 0 0 10px 0; color: #f1c40f; text-transform: uppercase; 
            text-shadow: 4px 4px 0 #000; -webkit-text-stroke: 2px #000; letter-spacing: 2px; 
        }
        h2 { 
            font-size: 1.5rem; color: #fff; background: #3498db; padding: 8px 30px; 
            border-radius: 20px; border: 4px solid #2c3e50; box-shadow: 4px 4px 0 #2c3e50; 
            margin: 20px 0 15px 0; 
        }

        .grid-container { display: grid; gap: 15px; width: 100%; }
        .char-grid { grid-template-columns: repeat(4, 1fr); }

        .select-card {
            background: #ecf0f1; border: 4px solid #2c3e50; border-radius: 16px;
            padding: 12px; cursor: pointer; transition: transform 0.1s, box-shadow 0.1s;
            text-align: center; box-shadow: 0 6px 0 #2c3e50; position: relative;
        }
        .select-card:hover { transform: translateY(-5px); }
        .select-card.selected {
            background: #f1c40f; border-color: #000;
            box-shadow: 0 8px 0 #d35400, 0 0 16px rgba(241,196,15,0.55);
            transform: translateY(-5px) scale(1.05); z-index: 10;
        }
        .select-card .name {
            font-size: 1.3rem; margin-bottom: 5px; color: #fff;
            -webkit-text-stroke: 1px #000; text-shadow: 2px 2px 0 #000;
            text-transform: uppercase; position: relative; z-index: 2;
        }
        .card-stats-row { 
            display: flex; align-items: center; background: rgba(0,0,0,0.18); 
            border-radius: 8px; padding: 4px 0; margin: 4px 0; 
        }
        .card-stat { flex: 1; text-align: center; font-size: 0.75rem; color: #fff; }

        button.brawl-btn {
            padding: 15px 60px; font-size: 3rem; color: #fff; background: #f1c40f;
            border: 6px solid #2c3e50; border-radius: 50px; cursor: pointer;
            text-transform: uppercase; font-family: 'Lilita One', cursive;
            -webkit-text-stroke: 2px #000; text-shadow: 3px 3px 0 #000;
            box-shadow: 0 10px 0 #d35400, 0 15px 20px rgba(0,0,0,0.4);
            transition: all 0.1s; margin-top: 30px;
        }
        button.brawl-btn:hover { background: #f39c12; transform: scale(1.05); }
        button.brawl-btn:active { 
            transform: translateY(10px) scale(1.0); box-shadow: 0 0px 0 #d35400; 
        }

        #hudCanvas { 
            position: absolute; top: 0; left: 0; 
            z-index: 50; pointer-events: none; 
            width: 100vw; height: 100vh;
        }
        
        /* Controls hint (v0.7 Sesja 5) */
        .controls-hint {
            margin-top: 18px;
            padding: 12px 24px;
            background: rgba(44, 62, 80, 0.08);
            border-radius: 16px;
            border: 2px dashed rgba(44, 62, 80, 0.25);
            color: #2c3e50;
            font-size: 0.95rem;
            text-align: center;
            line-height: 1.6;
            max-width: 700px;
        }
        .controls-hint b {
            color: #e74c3c;
            background: rgba(231, 76, 60, 0.1);
            padding: 2px 8px;
            border-radius: 6px;
            margin: 0 2px;
        }

        /* v0.18.3 — Game version stamp (bottom-left, dyskretny) */
        #credits {
            position: fixed;
            bottom: 14px;
            left: 14px;
            padding: 4px 10px;
            background: rgba(0, 0, 0, 0.45);
            color: #aaa;
            border-radius: 6px;
            font-family: sans-serif;
            font-size: 11px;
            z-index: 50;
            pointer-events: none;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <canvas id="hudCanvas"></canvas>

    <div id="uiLayer">
        <div id="welcomeScreen" class="screen active-screen">
            <h1>Brawl Tanks</h1>
            <h2>Wybierz swój czołg</h2>
            <div class="grid-container char-grid" id="charGrid"></div>
            <button class="brawl-btn" id="startBtn">Wejdź do Miasta!</button>
            <div class="controls-hint">
                <b>WASD</b> = ruch &nbsp;·&nbsp; <b>LPM</b> = strzał &nbsp;·&nbsp; <b>scroll</b> = wybór super<br>
                <b>PPM</b> lub <b>SPACE</b> = aktywuj super &nbsp;·&nbsp; 🔇 <b>M</b> = wycisz dźwięk
            </div>
        </div>
        <div id="victoryScreen" class="screen">
            <h1 style="color: #ffdd00;">🏆 ZWYCIĘSTWO!</h1>
            <h2 style="background: #27ae60;">Mega Boss pokonany</h2>
            <div id="victoryStats" style="font-size: 1.5rem; color: #2c3e50; margin: 20px 0;"></div>
            <button class="brawl-btn" id="playAgainBtn">Zagraj jeszcze raz</button>
        </div>

        <div id="gameOverScreen" class="screen">
            <h1 style="color: #e74c3c;">💀 PRZEGRANA</h1>
            <h2 style="background: #c0392b;">Twój czołg zniszczony</h2>
            <div id="gameOverStats" style="font-size: 1.5rem; color: #2c3e50; margin: 20px 0;"></div>
            <button class="brawl-btn" id="retryBtn">Spróbuj jeszcze raz</button>
          </div>
    </div>

    <div id="credits">Game version: v0.18.6-fix1</div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
