<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Tanks: WebGL Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">

    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; background-color: #1a1a2e; 
            font-family: 'Lilita One', cursive, sans-serif; user-select: none;
        }
        
        /* Ukrywa systemowy kursor w trakcie gry, bo mamy Twój czerwony celownik! */
        body.game-cursor-hidden { cursor: none !important; }

        #uiLayer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10; pointer-events: none; 
        }

        .screen {
            display: none; flex-direction: column; align-items: center;
            background: #fff; padding: 20px 40px 40px 40px;
            border-radius: 32px; border: 8px solid #2c3e50; color: #2c3e50;
            pointer-events: auto; 
            box-shadow: 0 20px 0 rgba(0,0,0,0.2), 0 25px 50px rgba(0,0,0,0.5);
            max-width: 900px; width: 90%; max-height: 90vh; overflow-y: auto;
        }
        .active-screen { display: flex; }

        h1 { font-size: 4rem; margin: 0 0 10px 0; color: #f1c40f; text-transform: uppercase; text-shadow: 4px 4px 0 #000; -webkit-text-stroke: 2px #000; letter-spacing: 2px; }
        h2 { font-size: 1.5rem; color: #fff; background: #3498db; padding: 8px 30px; border-radius: 20px; border: 4px solid #2c3e50; box-shadow: 4px 4px 0 #2c3e50; margin: 20px 0 15px 0; }

        .grid-container { display: grid; gap: 15px; width: 100%; }
        .char-grid { grid-template-columns: repeat(4, 1fr); }

        .select-card {
            background: #ecf0f1; border: 4px solid #2c3e50; border-radius: 16px;
            padding: 12px; cursor: pointer; transition: transform 0.1s, box-shadow 0.1s;
            text-align: center; box-shadow: 0 6px 0 #2c3e50; position: relative;
        }
        .select-card:hover { transform: translateY(-5px); }
        .select-card.selected {
            background: #f1c40f; border-color: #000;
            box-shadow: 0 8px 0 #d35400, 0 0 16px rgba(241,196,15,0.55);
            transform: translateY(-5px) scale(1.05); z-index: 10;
        }
        .select-card .name {
            font-size: 1.3rem; margin-bottom: 5px; color: #fff;
            -webkit-text-stroke: 1px #000; text-shadow: 2px 2px 0 #000;
            text-transform: uppercase; position: relative; z-index: 2;
        }
        .card-stats-row { display: flex; align-items: center; background: rgba(0,0,0,0.18); border-radius: 8px; padding: 4px 0; margin: 4px 0; }
        .card-stat { flex: 1; text-align: center; font-size: 0.75rem; color: #fff; }

        button.brawl-btn {
            padding: 15px 60px; font-size: 3rem; color: #fff; background: #f1c40f;
            border: 6px solid #2c3e50; border-radius: 50px; cursor: pointer;
            text-transform: uppercase; font-family: 'Lilita One', cursive;
            -webkit-text-stroke: 2px #000; text-shadow: 3px 3px 0 #000;
            box-shadow: 0 10px 0 #d35400, 0 15px 20px rgba(0,0,0,0.4);
            transition: all 0.1s; margin-top: 30px;
        }
        button.brawl-btn:hover { background: #f39c12; transform: scale(1.05); }
        button.brawl-btn:active { transform: translateY(10px) scale(1.0); box-shadow: 0 0px 0 #d35400; }

        /* HYBRYDOWE PŁÓTNO HUD */
        #hudCanvas { 
            position: absolute; top: 0; left: 0; 
            z-index: 50; pointer-events: none; 
            width: 100vw; height: 100vh;
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
</head>
<body>

    <canvas id="hudCanvas"></canvas>

    <div id="uiLayer">
        <div id="welcomeScreen" class="screen active-screen">
            <h1>Brawl Tanks</h1>
            <h2>Wybierz swój czołg</h2>
            <div class="grid-container char-grid" id="charGrid"></div>
            <button class="brawl-btn" id="startBtn">GRAJ!</button>
        </div>
    </div>

    <script>
        const WORLD_W = 3000;
        const WORLD_H = 3000;

        // DANE CZOŁGÓW
        const BRAWLERS = [
            { id: 'twardy', emoji: '🪖', icon: 'Tanks/twardy.jpg', name: 'Twardy', colorMain: '#27ae60', hp: 4, speed: 5, dmg: 1, reload: 400, type: 'standard' },
            { id: 'heavy', emoji: '🛡️', icon: 'Tanks/pancerny.jpg', name: 'Pancerny', colorMain: '#8e44ad', hp: 7, speed: 3.5, dmg: 1.5, reload: 700, type: 'standard' },
            { id: 'scout', emoji: '🔍', icon: 'Tanks/zwiadowca.jpg', name: 'Zwiad', colorMain: '#f1c40f', hp: 2, speed: 7.5, dmg: 0.8, reload: 250, type: 'standard' },
            { id: 'sniper', emoji: '🎯', icon: 'Tanks/snajper.jpg', name: 'Snajper', colorMain: '#3498db', hp: 3, speed: 4.5, dmg: 3, reload: 1000, type: 'fast' },
            { id: 'plasma', emoji: '💻', icon: 'Tanks/tech.jpg', name: 'Tech', colorMain: '#00cec9', hp: 4, speed: 5, dmg: 1.2, reload: 500, type: 'plasma' },
            { id: 'pyro', emoji: '🔥', icon: 'Tanks/ogniarz.jpg', name: 'Ogniarz', colorMain: '#e74c3c', hp: 5, speed: 4.8, dmg: 0.5, reload: 210, type: 'spread' },
            { id: 'shadow', emoji: '🌑', icon: 'Tanks/shadow.jpg', name: 'Shadow', colorMain: '#2c3e50', hp: 3, speed: 6.5, dmg: 1.5, reload: 600, type: 'standard' },
            { id: 'king', emoji: '👑', icon: 'Tanks/krol.jpg', name: 'King', colorMain: '#d35400', hp: 5, speed: 5.5, dmg: 2, reload: 500, type: 'standard' }
        ];

        let selectedBrawler = BRAWLERS[0];
        let gameState = 'MENU'; 

        // ─── ZMIENNE Z TWOJEGO ORYGINAŁU (DLA HUD) ───
        let stats = { kills: 0, score: 0 };
        let hudNotifs = [];
        let superCharges = 0, gemsSinceLastSuper = 0;
        let superActive = false, superEndTime = 0;
        let comboText = '', comboTextTimer = 0;
        let regularKills = 0, megaBossSpawned = false, megaBossKilled = false;
        let magnetActive = false, magnetEndTime = 0;
        let frames = 0;

        const SUPER_POWERS = [
            {id:'aura',  name:'AURA',      col:'#f1c40f', COOLDOWN:30000, DURATION:5000},
            {id:'bomb',  name:'MEGA BOMB', col:'#ff7c47', COOLDOWN:20000},
            {id:'freeze',name:'FREEZE',    col:'#70ccff', COOLDOWN:25000, DURATION:5000},
        ];
        let selectedPower = 0;
        let powerCooldowns = [0, 0, 0];
        let auraActive = false, auraEndTime = 0;
        let freezeActive = false, freezeEndTime = 0;

        // GENEROWANIE MENU
        const charGrid = document.getElementById('charGrid');
        BRAWLERS.forEach(b => {
            let div = document.createElement('div');
            div.className = `select-card ${b.id === selectedBrawler.id ? 'selected' : ''}`;
            
            div.innerHTML = `
                <div style="width:100%; height:130px; position:relative; border-radius:10px; overflow:hidden; border:2px solid ${b.colorMain}; background: #1a1a2e;">
                    <img src="${b.icon}" alt="${b.name}" style="position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:1;">
                </div>
                <div class="name" style="background:${b.colorMain};border-radius:8px;padding:4px 2px;margin-top:8px;">${b.emoji} ${b.name}</div>
                <div class="card-stats-row">
                    <span class="card-stat">❤️ ${b.hp}</span>
                    <span class="card-stat">⚡ ${b.speed}</span>
                    <span class="card-stat">💥 ${b.dmg}</span>
                </div>
            `;
            
            div.onclick = () => {
                document.querySelectorAll('.char-grid .select-card').forEach(el => el.classList.remove('selected'));
                div.classList.add('selected');
                selectedBrawler = b;
            };
            charGrid.appendChild(div);
        });

        // ─── INICJALIZACJA SILNIKA PIXI (WEBGL) ───
        const app = new PIXI.Application({
            resizeTo: window, backgroundColor: 0x1a1a2e, antialias: true            
        });
        document.body.appendChild(app.view);
        app.view.style.position = 'absolute'; app.view.style.zIndex = '1';

        const worldContainer = new PIXI.Container();
        worldContainer.sortableChildren = true; 
        app.stage.addChild(worldContainer);

        // ─── INICJALIZACJA PŁÓTNA HUD (CANVAS 2D) ───
        const hudCanvas = document.getElementById('hudCanvas');
        const hudCtx = hudCanvas.getContext('2d');
        let screenW = window.innerWidth, screenH = window.innerHeight;

        window.addEventListener('resize', () => {
            screenW = window.innerWidth; screenH = window.innerHeight;
            hudCanvas.width = screenW; hudCanvas.height = screenH;
        });
        hudCanvas.width = screenW; hudCanvas.height = screenH;

        // ─── TWÓJ ORYGINALNY KOD RYSOWANIA HUD ───
        function addHudNotif(text, color) {
            if(hudNotifs.length >= 3) hudNotifs.shift();
            hudNotifs.push({text, color, timer:200, maxTimer:200});
        }

        function drawHudNotifs(c) {
            if(hudNotifs.length === 0) return;
            const FONT='"Lilita One",cursive';
            c.font=`bold 15px ${FONT}`;
            hudNotifs.forEach((n, i) => {
                if(n.timer <= 0) return;
                n.timer--;
                const alpha = Math.min(1, n.timer/30) * Math.min(1, (n.maxTimer-n.timer+20)/20);
                const tw = c.measureText(n.text).width;
                const pw=tw+16, ph=24, pr=12;
                const px=222, py=8 + i*28;
                c.save(); c.globalAlpha=alpha;
                c.fillStyle='rgba(0,0,0,0.55)';
                c.beginPath(); c.roundRect(px,py,pw,ph,pr); c.fill();
                c.fillStyle=n.color;
                c.beginPath(); c.roundRect(px,py,4,ph,[pr,0,0,pr]); c.fill();
                c.textAlign='left'; c.textBaseline='middle';
                c.strokeStyle='rgba(0,0,0,0.7)'; c.lineWidth=3;
                c.strokeText(n.text, px+10, py+ph/2);
                c.fillStyle=n.color;
                c.fillText(n.text, px+10, py+ph/2);
                c.restore();
            });
            hudNotifs = hudNotifs.filter(n => n.timer > 0);
            c.textAlign='left'; c.globalAlpha=1;
        }

        function hpColorRGB(t) {
            if(t >= 0.5) {
                const s=(1-t)*2;
                return [Math.round(46+s*(255-46)), Math.round(204+s*(165-204)), Math.round(113+s*(0-113))];
            } else {
                const s=(0.5-t)*2;
                return [Math.round(255+s*(231-255)), Math.round(165+s*(76-165)), Math.round(s*60)];
            }
        }

        function drawHPPill(c, px, py, PW, PH, r) {
            if(!player) return;
            const curHP = player.hp || 0;
            const maxHP = player.maxHp || 5;
            const t = maxHP > 0 ? Math.max(0, Math.min(1, curHP/maxHP)) : 0;
            const [rv,gv,bv] = hpColorRGB(t);
            const col = `rgb(${rv},${gv},${bv})`;
            const accent = `rgba(${rv},${gv},${bv},0.38)`;
            const FONT = '"Lilita One",cursive';

            c.fillStyle='rgba(8,8,18,0.75)';
            c.beginPath(); c.roundRect(px,py,PW,PH,r); c.fill();
            c.strokeStyle=accent; c.lineWidth=0.8;
            c.beginPath(); c.roundRect(px,py,PW,PH,r); c.stroke();

            const PAD=14, GAP=10, cy=py+PH/2;

            c.fillStyle='rgba(255,255,255,0.5)';
            c.font=`bold 14px ${FONT}`;
            c.textAlign='left'; c.textBaseline='middle';
            c.fillText('HP', px+PAD, cy);
            const lblW = c.measureText('HP').width;

            const numStr = `${Math.ceil(curHP)}/${Math.ceil(maxHP)}`;
            c.font=`32px ${FONT}`;
            const numW = c.measureText(numStr).width;
            const numX = px+PW-PAD-numW;
            c.strokeStyle='rgba(0,0,0,0.75)'; c.lineWidth=4;
            c.strokeText(numStr, numX, cy+1);
            c.fillStyle=col; c.fillText(numStr, numX, cy+1);

            const BH=12, barX=px+PAD+lblW+GAP, barW=numX-barX-GAP, barY=cy-BH/2;
            c.fillStyle='rgba(255,255,255,0.07)';
            c.beginPath(); c.roundRect(barX,barY,barW,BH,BH/2); c.fill();
            if(t > 0) {
                const fw=barW*t;
                c.fillStyle=`rgba(${rv},${gv},${bv},0.85)`;
                c.beginPath(); c.roundRect(barX,barY,fw,BH,BH/2); c.fill();
                c.fillStyle='rgba(255,255,255,0.15)';
                c.beginPath(); c.roundRect(barX,barY,fw,BH/2,BH/2); c.fill();
            }
            const mx=Math.ceil(maxHP);
            for(let i=1;i<mx;i++){
                const tx=barX+barW*(i/mx);
                c.strokeStyle='rgba(0,0,0,0.4)'; c.lineWidth=1.5;
                c.beginPath(); c.moveTo(tx,barY+2); c.lineTo(tx,barY+BH-2); c.stroke();
            }
            if(t <= 0.25 && t > 0){
                c.strokeStyle=`rgba(${rv},${gv},${bv},${0.45+Math.sin(frames*0.1)*0.35})`;
                c.lineWidth=1.8;
                c.beginPath(); c.roundRect(px,py,PW,PH,r); c.stroke();
            }
        }

        function drawPowerIcon(c, type, cx, cy, r, alpha) {
            c.save(); c.globalAlpha=alpha; c.translate(cx,cy);
            if(type==='aura'){
                const bg=c.createRadialGradient(0,0,0,0,0,r*1.1);
                bg.addColorStop(0,'rgba(50,30,0,0.95)'); bg.addColorStop(1,'rgba(20,10,0,0.95)');
                c.fillStyle=bg; c.beginPath(); c.roundRect(-r*1.05,-r*0.78,r*2.1,r*1.56,6); c.fill();
                for(let i=2;i>=0;i--){
                    const ri=r*(0.42+i*0.19);
                    c.strokeStyle=i===0?'#f1c40f':i===1?'#e67e22':'#d35400';
                    c.lineWidth=i===0?2.5:1.8;
                    c.globalAlpha=alpha*(0.9-i*0.2);
                    c.beginPath(); c.arc(0,0,ri,0,Math.PI*2); c.stroke();
                }
                c.globalAlpha=alpha;
                c.strokeStyle='#f1c40f'; c.lineWidth=1.8;
                for(let i=0;i<4;i++){
                    const a=i*Math.PI/2;
                    const r1=r*0.5, r2=r*0.78;
                    c.beginPath(); c.moveTo(Math.cos(a)*r1,Math.sin(a)*r1);
                    c.lineTo(Math.cos(a)*r2,Math.sin(a)*r2); c.stroke();
                }
            } else if(type==='bomb'){
                const bg2=c.createRadialGradient(0,0,0,0,0,r*1.1);
                bg2.addColorStop(0,'rgba(50,15,0,0.95)'); bg2.addColorStop(1,'rgba(15,5,0,0.95)');
                c.fillStyle=bg2; c.beginPath(); c.roundRect(-r*1.05,-r*0.78,r*2.1,r*1.56,6); c.fill();
                for(let i=0;i<8;i++){
                    const a=i*Math.PI/4;
                    const w=r*(0.14+0.05*(i%2));
                    c.fillStyle=i%2===0?'rgba(255,100,0,0.8)':'rgba(255,160,0,0.6)';
                    c.save(); c.rotate(a);
                    c.beginPath();
                    c.moveTo(0,-w/2); c.lineTo(r*0.95,0); c.lineTo(0,w/2); c.closePath(); c.fill();
                    c.restore();
                }
                c.fillStyle='#888'; c.strokeStyle='#555'; c.lineWidth=2;
                c.beginPath();
                for(let i=0;i<8;i++){const a=i*Math.PI/4-Math.PI/8; c.lineTo(Math.cos(a)*r*0.36,Math.sin(a)*r*0.36);}
                c.closePath(); c.fill(); c.stroke();
                c.fillStyle='#111'; c.beginPath(); c.roundRect(-r*0.16,-r*0.06,r*0.32,r*0.12,2); c.fill();
                c.fillStyle='#ff4400'; c.font=`bold ${Math.round(r*0.14)}px monospace`;
                c.textAlign='center'; c.textBaseline='middle'; c.fillText('00:01',0,0);
            } else if(type==='freeze'){
                const bg3=c.createRadialGradient(0,0,0,0,0,r*1.1);
                bg3.addColorStop(0,'rgba(0,20,50,0.95)'); bg3.addColorStop(1,'rgba(0,5,25,0.95)');
                c.fillStyle=bg3; c.beginPath(); c.roundRect(-r*1.05,-r*0.78,r*2.1,r*1.56,6); c.fill();
                c.strokeStyle='#70ccff'; c.lineCap='round';
                for(let i=0;i<6;i++){
                    const a=i*Math.PI/3;
                    c.lineWidth=2; c.strokeStyle='#70ccff';
                    c.beginPath(); c.moveTo(0,0); c.lineTo(Math.cos(a)*r*0.58,Math.sin(a)*r*0.58); c.stroke();
                    c.fillStyle='rgba(112,204,255,0.7)';
                    c.beginPath(); c.arc(Math.cos(a)*r*0.62,Math.sin(a)*r*0.62,2.5,0,Math.PI*2); c.fill();
                }
                c.fillStyle='#b0e8ff'; c.strokeStyle='#70ccff'; c.lineWidth=1.5;
                c.beginPath(); for(let i=0;i<6;i++){const a=i*Math.PI/3;c.lineTo(Math.cos(a)*r*0.13,Math.sin(a)*r*0.13);}
                c.closePath(); c.fill(); c.stroke();
            }
            c.restore(); c.globalAlpha=1;
        }

        function drawSuperPowerHUD(c) {
            const SW=96, SH=72, LBL=14, gap=10;
            const totalW=SW*3+gap*2;
            const startX=Math.round(screenW/2-totalW/2);
            const sy=screenH-104-12-SH-LBL;
            const now=Date.now();

            SUPER_POWERS.forEach((p,i)=>{
                const bx=startX+i*(SW+gap), by=sy;
                const onCD=now<powerCooldowns[i];
                const cdLeft=onCD?Math.ceil((powerCooldowns[i]-now)/1000):0;
                const isSelected=i===selectedPower;
                const alpha=onCD?0.22:1;

                c.fillStyle='rgba(0,0,0,0.38)';
                c.beginPath(); c.roundRect(bx+3,by+3,SW,SH+LBL,8); c.fill();

                c.globalAlpha=isSelected?0.96:0.72;
                c.fillStyle='#08080e';
                c.beginPath(); c.roundRect(bx,by,SW,SH+LBL,8); c.fill();
                c.globalAlpha=1;

                if(isSelected&&!onCD){
                    c.save();
                    c.strokeStyle=p.col; c.lineWidth=4;
                    c.globalAlpha=0.85+Math.sin(frames*0.09)*0.12;
                    c.beginPath(); c.roundRect(bx,by,SW,SH+LBL,8); c.stroke();
                    c.restore();
                } else {
                    c.strokeStyle=onCD?'rgba(255,255,255,0.08)':'rgba(255,255,255,0.2)';
                    c.lineWidth=0.8;
                    c.globalAlpha=alpha;
                    c.beginPath(); c.roundRect(bx,by,SW,SH+LBL,8); c.stroke();
                    c.globalAlpha=1;
                }

                drawPowerIcon(c, p.id, bx+SW/2, by+SH/2, 29, alpha);

                c.globalAlpha=alpha;
                c.fillStyle=isSelected&&!onCD?p.col:'rgba(255,255,255,0.55)';
                c.font=`bold 8px sans-serif`;
                c.textAlign='center'; c.textBaseline='middle';
                c.fillText(p.name, bx+SW/2, by+SH+LBL/2);
                c.globalAlpha=1;

                if(onCD){
                    const pct=(powerCooldowns[i]-now)/SUPER_POWERS[i].COOLDOWN;
                    c.save();
                    c.beginPath(); c.roundRect(bx+1,by+1,SW-2,SH-2,7); c.clip();
                    c.fillStyle='rgba(0,0,0,0.62)';
                    c.beginPath();
                    c.moveTo(bx+SW/2,by+SH/2);
                    c.arc(bx+SW/2,by+SH/2,SW,-Math.PI/2,-Math.PI/2+Math.PI*2*pct);
                    c.closePath(); c.fill();
                    c.restore();
                    c.fillStyle='#fff'; c.font='bold 20px "Lilita One",cursive';
                    c.textAlign='center'; c.textBaseline='middle';
                    c.strokeStyle='rgba(0,0,0,0.8)'; c.lineWidth=4;
                    c.strokeText(cdLeft+'s',bx+SW/2,by+SH/2);
                    c.fillText(cdLeft+'s',bx+SW/2,by+SH/2);
                }

                if(isSelected&&!onCD){
                    c.fillStyle=p.col; c.globalAlpha=0.92;
                    const tx=bx+SW/2, ty=by+SH+LBL+5;
                    c.beginPath();
                    c.moveTo(tx-6,ty); c.lineTo(tx+6,ty); c.lineTo(tx,ty+6);
                    c.closePath(); c.fill(); c.globalAlpha=1;
                }
            });

            c.fillStyle='rgba(255,255,255,0.25)';
            c.font='8px sans-serif'; c.textAlign='center'; c.textBaseline='alphabetic';
            c.fillText('scroll ← →  wybierz    PPM = użyj', screenW/2, sy-6);
            c.textAlign='left';

            if(magnetActive){
                const mLeft=Math.max(0,magnetEndTime-Date.now());
                const mw=180, mx=screenW/2-mw/2, my=sy-22;
                c.fillStyle='rgba(0,0,0,0.48)';
                c.beginPath(); c.roundRect(mx,my,mw,14,7); c.fill();
                c.fillStyle='#e17055';
                c.beginPath(); c.roundRect(mx,my,mw*(mLeft/10000),14,7); c.fill();
                c.fillStyle='#fff'; c.font='bold 8px sans-serif'; c.textAlign='center'; c.textBaseline='middle';
                c.fillText(`🧲 MAGNES ${Math.ceil(mLeft/1000)}s`, screenW/2, my+7);
                c.textAlign='left';
            }
        }

        // ==========================================
        // GŁÓWNA FUNKCJA RYSUJĄCA HUD
        // ==========================================
        function renderHUD(c) {
            if (gameState !== 'PLAYING' || !player) return;

            // Pigułka HP i Powiadomienia
            drawHPPill(c, 14, 8, 200, 54, 16);
            drawHudNotifs(c);

            // LICZNIK GEMÓW (Góra Środek)
            {
                const GW=200,GH=54,gx2=Math.round(screenW/2-GW/2),gy2=8,r2=16;
                c.fillStyle='rgba(8,8,18,0.75)';
                c.beginPath();c.roundRect(gx2,gy2,GW,GH,r2);c.fill();

        // ==========================================
        // KLASY PIXI.JS
        // ==========================================
        function createBrawlerTextures(brawler) {
            const createTex = (drawFn) => {
                const canvas = document.createElement('canvas');
                canvas.width = 160; canvas.height = 160;
                const ctx = canvas.getContext('2d');
                ctx.translate(80, 80); ctx.scale(1.75, 1.75);
                drawFn(ctx); return PIXI.Texture.from(canvas);
            };
            return {
                hull: createTex((ctx) => drawTankHull(ctx, brawler)),
                turret: createTex((ctx) => drawTankTurret(ctx, brawler))
            };
        }

        function drawTankHull(c, brawler) {
            const id=brawler.id, col=brawler.colorMain;
            const cL=lerpHex(col,45), cD=lerpHex(col,-35);
            const HL=52, HW=26, TRK=5, hhl=HL/2, hhw=HW/2;
            c.fillStyle='#1c1c1c'; c.beginPath(); c.roundRect(-hhl,-(hhw+TRK/2+0.5)-TRK/2,HL,TRK,2); c.fill();
            c.beginPath(); c.roundRect(-hhl,(hhw+TRK/2+0.5)-TRK/2,HL,TRK,2); c.fill();
            c.lineWidth=1.5; c.strokeStyle='#000';
            c.fillStyle=col; c.beginPath(); c.roundRect(-hhl,-hhw,HL,HW,3); c.fill(); c.stroke();
            c.fillStyle=cL; c.globalAlpha=0.28; c.beginPath(); c.roundRect(-hhl,-hhw,HL*0.2,HW,3); c.fill(); c.globalAlpha=1;
            c.fillStyle=cD; c.globalAlpha=0.38; c.beginPath(); c.roundRect(hhl-HL*0.28,-hhw,HL*0.28,HW,3); c.fill(); c.globalAlpha=1;
        }

        function drawTankTurret(c, brawler) {
            const col=brawler.colorMain;
            const tr=12, bl=20, bw=5, bstart=tr*0.6;
            c.fillStyle=lerpHex(col,-18); c.strokeStyle='#000'; c.lineWidth=1.5;
            c.beginPath(); c.arc(0,0,tr+2,0,Math.PI*2); c.fill(); c.stroke();
            c.fillStyle=lerpHex(col,-40);
            c.beginPath(); c.arc(0,0,tr,0,Math.PI*2); c.fill(); c.stroke();
            c.fillStyle='#484848';
            c.beginPath(); c.roundRect(bstart,-bw/2,bl,bw,bw*0.25); c.fill(); c.stroke();
        }

        const ENEMY_BRAWLER = BRAWLERS[1]; 
        const ENEMY_TEXTURES = createBrawlerTextures(ENEMY_BRAWLER);

        class Player {
            constructor(brawlerData) {
                this.brawler = brawlerData;
                this.x = window.innerWidth / 2; this.y = window.innerHeight / 2;
                this.speed = this.brawler.speed; this.maxHp = this.brawler.hp; this.hp = this.maxHp;
                
                this.container = new PIXI.Container(); this.container.x = this.x; this.container.y = this.y;
                const textures = createBrawlerTextures(this.brawler);
                this.hull = new PIXI.Sprite(textures.hull); this.hull.anchor.set(0.5);
                this.turret = new PIXI.Sprite(textures.turret); this.turret.anchor.set(0.5);

                this.container.addChild(this.hull); this.container.addChild(this.turret);
                worldContainer.addChild(this.container);
            }
            takeDamage(amount) {
                if(auraActive && Date.now() < auraEndTime) return; // Chroniony przez aurę
                this.hp -= amount;
                if(this.hp <= 0) {
                    gameState = 'MENU';
                    document.getElementById('welcomeScreen').classList.add('active-screen');
                    document.body.classList.remove('game-cursor-hidden');
                    hudCtx.clearRect(0,0,screenW,screenH); // Wyczyść HUD
                    worldContainer.removeChildren(); 
                }
            }
            update(keys, mouseWorldX, mouseWorldY) {
                let dx = 0; let dy = 0;
                if (keys.w) dy -= 1; if (keys.s) dy += 1; if (keys.a) dx -= 1; if (keys.d) dx += 1;
                if (dx !== 0 || dy !== 0) {
                    let len = Math.sqrt(dx * dx + dy * dy);
                    this.x += (dx / len) * this.speed; this.y += (dy / len) * this.speed;
                    this.hull.rotation = Math.atan2(dy, dx);
                }
                this.container.x = this.x; this.container.y = this.y;
                this.turret.rotation = Math.atan2(mouseWorldY - this.y, mouseWorldX - this.x);
                this.container.zIndex = this.y + 19; 
            }
        }

        class Enemy {
            constructor(x, y) {
                this.x = x; this.y = y; this.speed = 2.5; this.maxHp = 6; this.hp = this.maxHp; this.active = true;
                this.container = new PIXI.Container(); this.container.x = this.x; this.container.y = this.y;
                
                this.hull = new PIXI.Sprite(ENEMY_TEXTURES.hull); this.hull.anchor.set(0.5);
                this.turret = new PIXI.Sprite(ENEMY_TEXTURES.turret); this.turret.anchor.set(0.5);
                this.hull.tint = 0xff4444; this.turret.tint = 0xff4444; 

                this.hpBar = new PIXI.Graphics(); this.hpBar.y = -55; this.drawHp();
                this.container.addChild(this.hull); this.container.addChild(this.turret); this.container.addChild(this.hpBar);
                worldContainer.addChild(this.container);
            }
            drawHp() {
                this.hpBar.clear(); this.hpBar.beginFill(0x000000, 0.5); this.hpBar.drawRect(-20, 0, 40, 5);
                this.hpBar.beginFill(0xff3300); this.hpBar.drawRect(-20, 0, Math.max(0, (this.hp/this.maxHp)*40), 5); this.hpBar.endFill();
            }
            update(delta, targetX, targetY) {
                if (!this.active) return;
                let dx = targetX - this.x; let dy = targetY - this.y; let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist > 60) { this.x += (dx / dist) * this.speed * delta; this.y += (dy / dist) * this.speed * delta; }
                this.hull.rotation = Math.atan2(dy, dx); this.turret.rotation = Math.atan2(dy, dx); 
                this.container.x = this.x; this.container.y = this.y; this.container.zIndex = this.y + 19; 
            }
            takeDamage(amount) {
                this.hp -= amount; this.drawHp();
                if (this.hp <= 0) {
                    this.active = false; worldContainer.removeChild(this.container); this.container.destroy({ children: true }); 
                    stats.kills++;
                    stats.score += 2;
                    gemsSinceLastSuper += 2;
                    if(gemsSinceLastSuper >= 10) { superCharges++; gemsSinceLastSuper=0; }
                    
                    const now = Date.now();
                    if(now < comboEndTime) comboCount++; else comboCount = 1;
                    comboEndTime = now + 2000;
                    if(comboCount === 2){ comboText='DOUBLE!'; comboTextTimer=90; }
                    else if(comboCount === 3){ comboText='TRIPLE!'; comboTextTimer=100; }
                    else if(comboCount >= 4){ comboText='MEGA KILL! 💥'; comboTextTimer=110; }
                }
            }
        }

        class Bullet {
            constructor(x, y, angle, brawlerInfo) {
                this.x = x; this.y = y; this.active = true; this.distance = 0; 
                this.dmg = brawlerInfo.dmg;
                this.speed = 15; this.radius = 6;
                this.vx = Math.cos(angle) * this.speed; this.vy = Math.sin(angle) * this.speed;

                let color = 0x2ecc71; 
                if(brawlerInfo.id === 'pyro') color = 0xe74c3c;
                else if(brawlerInfo.id === 'plasma') color = 0x00cec9;
                else if(brawlerInfo.id === 'shadow') color = 0x6c3483;
                else if(brawlerInfo.id === 'sniper') color = 0xffffff;

                this.gfx = new PIXI.Graphics();
                this.gfx.beginFill(color);
                this.gfx.drawCircle(0, 0, this.radius); 
                this.gfx.endFill();
                this.gfx.x = this.x; this.gfx.y = this.y; this.gfx.zIndex = this.y + 10; 
                worldContainer.addChild(this.gfx);
            }
            update(delta) {
                if (!this.active) return;
                this.x += this.vx * delta; this.y += this.vy * delta;
                this.gfx.x = this.x; this.gfx.y = this.y; this.gfx.zIndex = this.y + 10;
                this.distance += this.speed * delta; if (this.distance > 1000) this.destroy();
            }
            destroy() { this.active = false; worldContainer.removeChild(this.gfx); this.gfx.destroy(); }
        }

        let player = null;

        const mouse = { screenX: window.innerWidth/2, screenY: window.innerHeight/2 };

        document.getElementById('startBtn').addEventListener('click', () => {
            document.getElementById('welcomeScreen').classList.remove('active-screen');
            document.body.classList.add('game-cursor-hidden');
            
            worldContainer.removeChildren();
            const grid = new PIXI.Graphics();
            grid.lineStyle(2, 0x333344, 0.5); 
            for(let i = -2000; i <= 4000; i += 100) {
                grid.moveTo(i, -2000); grid.lineTo(i, 4000);
                grid.moveTo(-2000, i); grid.lineTo(4000, i);
            }
            worldContainer.addChild(grid);

            stats.score = 0; stats.kills = 0;
            superCharges = 0; gemsSinceLastSuper = 0;
            player = new Player(selectedBrawler);
            enemies = [new Enemy(1000, 500), new Enemy(200, 900), new Enemy(-300, 300)];
            bullets = [];
            isMouseDown = false;
            gameState = 'PLAYING';
        });

        // GŁÓWNA PĘTLA
        app.ticker.add((delta) => {
            if (gameState !== 'PLAYING' || !player) return;
            frames++;

            worldContainer.x = ~~(window.innerWidth / 2 - player.x);
            worldContainer.y = ~~(window.innerHeight / 2 - player.y);
            let mouseWorldX = mouse.screenX - worldContainer.x; let mouseWorldY = mouse.screenY - worldContainer.y;

            player.update(keys, mouseWorldX, mouseWorldY);

            const now = Date.now();
            if (isMouseDown && now - lastShotTime > player.brawler.reload) {
                let angle = player.turret.rotation;
                let startX = player.x + Math.cos(angle) * 45; 
                let startY = player.y + Math.sin(angle) * 45;

                if (player.brawler.type === 'spread') {
                    bullets.push(new Bullet(startX, startY, angle - 0.2, player.brawler));
                    bullets.push(new Bullet(startX, startY, angle, player.brawler));
                    bullets.push(new Bullet(startX, startY, angle + 0.2, player.brawler));
                } else {
                    bullets.push(new Bullet(startX, startY, angle, player.brawler));
                }
                lastShotTime = now;
            }
            
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i]; b.update(delta);
                if (!b.active) bullets.splice(i, 1);
            }
            
            for (let i = enemies.length - 1; i >= 0; i--) {
                let enemy = enemies[i];
                enemy.update(delta, player.x, player.y);
                
                let distToPlayer = (player.x - enemy.x) * (player.x - enemy.x) + (player.y - enemy.y) * (player.y - enemy.y);
                if (distToPlayer < 45 * 45) { 
                    player.takeDamage(2); enemy.hp = 0; enemy.takeDamage(100); 
                }

                for (let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j]; if (!b.active) continue;
                    let dx = b.x - enemy.x; let dy = b.y - enemy.y;
                    
                    if (dx * dx + dy * dy < (30 + b.radius) * (30 + b.radius)) {
                        b.destroy(); bullets.splice(j, 1); 
                        enemy.takeDamage(b.dmg); 
                        break; 
                    }
                }
                if (!enemy.active) enemies.splice(i, 1);
            }

            if(comboTextTimer > 0) comboTextTimer--;

            // RYSOWANIE HUD NA PRZEZROCZYSTYM PŁÓTNIE
            hudCtx.clearRect(0, 0, screenW, screenH);
            renderHUD(hudCtx);
        });
    </script>
</body>
</html>
