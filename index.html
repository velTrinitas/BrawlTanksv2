<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

    <!-- ============================================================
         FAZA 6e PWA + Mobile native feel
         v0.23.1 — landscape orientation locked for mobile gameplay
         ============================================================ -->

    <!-- PWA manifest -->
    <link rel="manifest" href="./manifest.webmanifest">

    <!-- Theme color (Android Chrome browser bar + Edge title bar) -->
    <meta name="theme-color" content="#1a252f">

    <!-- Favicon (multi-format) -->
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon.png">
    <link rel="icon" type="image/x-icon" href="./favicon.ico">

    <!-- Apple touch icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="./apple-touch-icon.png">

    <!-- iOS: web app capable + status bar + title -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Brawl Tanks">

    <!-- Android: mobile-web-app capable -->
    <meta name="mobile-web-app-capable" content="yes">

    <!-- SEO + social shares -->
    <meta name="description" content="Top-down tank brawler arena - 8 brawlers, survival vs hordes, super shots and special powers.">
    <meta property="og:title" content="Brawl Tanks Season 2">
    <meta property="og:description" content="Top-down tank brawler arena - 8 brawlers, survival vs hordes.">
    <meta property="og:image" content="./icon-512.png">
    <meta property="og:type" content="website">

    <!-- ============================================================ -->

    <title>Brawl Tanks — Season 2</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Titan+One&display=swap" rel="stylesheet">

    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; background-color: #1a1a2e; 
            font-family: 'Titan One', cursive, sans-serif; user-select: none;
        }
        body.game-cursor-hidden { cursor: none !important; }

        #uiLayer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100; pointer-events: none; 
        }

        .screen {
            display: none; flex-direction: column; align-items: center;
            background: #fff; padding: 26px 24px 28px;
            border-radius: 32px; border: 8px solid #2c3e50; color: #2c3e50;
            pointer-events: auto; 
            box-shadow: 0 20px 0 rgba(0,0,0,0.2), 0 25px 50px rgba(0,0,0,0.5);
            max-width: 460px; width: 90%; max-height: 90vh; overflow-y: auto;
        }
        .active-screen { display: flex; }

        /* FAZA 6.5.2b-fix1: SCOPED h1/h2 - tylko endcards (NIE global!).
           Wczesniejszy global `h1 { ... }` / `h2 { ... }` nadpisywal styling MainMenu pickers
           (np. .bt-picker-title ktory uzywa <h2>). Teraz scoped only do legacy endcards. */
        #victoryScreen h1, #gameOverScreen h1 { 
            font-size: 4rem; margin: 0 0 10px 0; color: #f1c40f; text-transform: uppercase; 
            text-shadow: 4px 4px 0 #000; -webkit-text-stroke: 2px #000; letter-spacing: 2px; 
        }
        #victoryScreen h2, #gameOverScreen h2 { 
            font-size: 1.5rem; color: #fff; background: #3498db; padding: 8px 30px; 
            border-radius: 20px; border: 4px solid #2c3e50; box-shadow: 4px 4px 0 #2c3e50; 
            margin: 20px 0 15px 0; 
        }

        button.brawl-btn {
            padding: 15px 60px; font-size: 3rem; color: #fff; background: #f1c40f;
            border: 6px solid #2c3e50; border-radius: 50px; cursor: pointer;
            text-transform: uppercase; font-family: 'Titan One', cursive;
            -webkit-text-stroke: 2px #000; text-shadow: 3px 3px 0 #000;
            box-shadow: 0 10px 0 #d35400, 0 15px 20px rgba(0,0,0,0.4);
            transition: all 0.1s; margin-top: 30px;
        }
        button.brawl-btn:hover { background: #f39c12; transform: scale(1.05); }
        button.brawl-btn:active { 
            transform: translateY(10px) scale(1.0); box-shadow: 0 0px 0 #d35400; 
        }

        #hudCanvas { 
            position: absolute; top: 0; left: 0; 
            z-index: 50; pointer-events: none; 
            width: 100vw; height: 100vh;
        }

        /* v0.18.3 — Game version stamp (bottom-left, dyskretny) */
        #credits {
            position: fixed;
            bottom: 14px;
            left: 14px;
            padding: 4px 10px;
            background: rgba(0, 0, 0, 0.45);
            color: #aaa;
            border-radius: 6px;
            font-family: sans-serif;
            font-size: 11px;
            z-index: 50;
            pointer-events: none;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <canvas id="hudCanvas"></canvas>

    <!-- FAZA 6.5.2b: MainMenu mount point -->
    <div id="bt-menu-root"></div>

    <div id="uiLayer">
        <div id="victoryScreen" class="screen">
            <h1 style="color: #ffdd00;">🏆 ZWYCIĘSTWO!</h1>
            <h2 style="background: #27ae60;">Mega Boss pokonany</h2>
            <div id="victoryStats" style="font-size: 1.5rem; color: #2c3e50; margin: 20px 0;"></div>
            <button class="brawl-btn" id="playAgainBtn">Powrót do menu</button>
        </div>

        <div id="gameOverScreen" class="screen">
            <h1 style="color: #e74c3c;">💀 PRZEGRANA</h1>
            <h2 style="background: #c0392b;">Twój czołg zniszczony</h2>
            <div id="gameOverStats" style="font-size: 1.5rem; color: #2c3e50; margin: 20px 0;"></div>
            <button class="brawl-btn" id="retryBtn">Powrót do menu</button>
        </div>
    </div>

    <!-- v0.23.1 — Portrait warning overlay (activates only on mobile + portrait via CSS media query) -->
    <div class="bt-portrait-warning" aria-hidden="true">
        <div class="bt-portrait-warning-icon">📱</div>
        <div class="bt-portrait-warning-title">Obróć telefon do poziomu</div>
        <div class="bt-portrait-warning-subtitle">Brawl Tanks gra się najlepiej w trybie poziomym — szersze pole bitwy widać lepiej 🔄</div>
    </div>

    <div id="credits">Game version: v0.58.0</div>

    <script type="module" src="/src/main.ts"></script>

    <!-- ============================================================
         FAZA 6e.3 - Service Worker registration
         FAZA 8.5 - Added LAN IP guards dla mobile testing przez Vite --host
         ============================================================ -->
    <script>
        (function () {
            var hostname = window.location.hostname;

            var isLocalDev =
                hostname === 'localhost' ||
                hostname === '127.0.0.1' ||
                hostname.endsWith('.local') ||
                // FAZA 8.5: LAN IPs (RFC 1918 private ranges) dla mobile testing
                // przez WiFi gdy Vite uruchamiony z --host flag.
                /^192\.168\.\d+\.\d+$/.test(hostname) ||
                /^10\.\d+\.\d+\.\d+$/.test(hostname) ||
                /^172\.(1[6-9]|2\d|3[0-1])\.\d+\.\d+$/.test(hostname);

            var isSandboxPreview =
                hostname.indexOf('claudeusercontent') !== -1 ||
                hostname.indexOf('codespaces') !== -1 ||
                hostname.indexOf('vercel.app') !== -1 ||
                hostname.indexOf('netlify.app') !== -1 ||
                hostname.indexOf('stackblitz') !== -1;

            var shouldSkipSW = isLocalDev || isSandboxPreview;

            if ('serviceWorker' in navigator && !shouldSkipSW) {
                window.addEventListener('load', function () {
                    navigator.serviceWorker.register('./sw.js', { scope: './' })
                        .then(function (reg) {
                            console.log('[PWA] SW registered, scope:', reg.scope);

                            reg.addEventListener('updatefound', function () {
                                var newWorker = reg.installing;
                                if (newWorker) {
                                    newWorker.addEventListener('statechange', function () {
                                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                            console.log('[PWA] New version available - reload to update');
                                        }
                                    });
                                }
                            });
                        })
                        .catch(function (err) {
                            console.debug('[PWA] SW registration skipped (script not available):', err.message);
                        });
                });
            } else if (shouldSkipSW) {
                console.log('[PWA] SW registration skipped (dev/sandbox env: ' + hostname + ')');
            }
        })();
    </script>
</body>
</html>
