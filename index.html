    <script>
        // ==========================================
        // ETAP 1: INICJALIZACJA SILNIKA PIXI.JS
        // ==========================================

        const app = new PIXI.Application({
            resizeTo: window,          
            backgroundColor: 0x1a1a2e, 
            antialias: true            
        });

        document.body.appendChild(app.view);
        app.view.style.position = 'absolute';
        app.view.style.zIndex = '1';

        const worldContainer = new PIXI.Container();
        worldContainer.sortableChildren = true; 
        app.stage.addChild(worldContainer);

        // ==========================================

        class Player {
            constructor() {
                this.x = window.innerWidth / 2;
                this.y = window.innerHeight / 2;
                this.speed = 6;
                
                // 1. GŁÓWNY KONTENER CZOŁGU (Pudło trzymające wszystko)
                this.container = new PIXI.Container();
                this.container.x = this.x;
                this.container.y = this.y;
                
                // 2. KADŁUB I GĄSIENICE
                this.hull = new PIXI.Graphics();
                this.hull.beginFill(0x111111); // Gąsienice (Czerń)
                this.hull.drawRect(-23, -23, 46, 10);
                this.hull.drawRect(-23, 13, 46, 10);
                this.hull.beginFill(0x27ae60); // Pancerz (Zieleń)
                this.hull.drawRoundedRect(-23, -19, 46, 38, 8);
                this.hull.endFill();
                
                // 3. WIEŻA I LUFA
                this.turret = new PIXI.Graphics();
                this.turret.beginFill(0x555555); // Lufa (Szary)
                this.turret.drawRect(10, -6, 25, 12);
                this.turret.beginFill(0x27ae60); // Baza wieży
                this.turret.drawCircle(0, 0, 16);
                this.turret.endFill();
                
                // 4. SKŁADANIE DRZEWA
                this.container.addChild(this.hull);
                this.container.addChild(this.turret);
                
                // Dodajemy czołg do świata gry
                worldContainer.addChild(this.container);
            }

        // Tworzymy naszego gracza
        const player = new Player();

        // ==========================================
        // ETAP 3: STEROWANIE I PĘTLA GRY
        // ==========================================

        const keys = { w: false, a: false, s: false, d: false };
        const mouse = { screenX: window.innerWidth/2, screenY: window.innerHeight/2 };

        window.addEventListener('keydown', e => { 
            let k = e.key.toLowerCase(); if (keys.hasOwnProperty(k)) keys[k] = true; 
        });
        window.addEventListener('keyup', e => { 
            let k = e.key.toLowerCase(); if (keys.hasOwnProperty(k)) keys[k] = false; 
        });

        app.view.addEventListener('pointermove', e => {
            mouse.screenX = e.clientX;
            mouse.screenY = e.clientY;
        });

        // GŁÓWNA PĘTLA
        app.ticker.add((delta) => {
            // 1. Obliczamy ruch Kamery
            worldContainer.x = ~~(window.innerWidth / 2 - player.x);
            worldContainer.y = ~~(window.innerHeight / 2 - player.y);

            // 2. Przeliczamy pozycję myszki z ekranu na świat gry
            let mouseWorldX = mouse.screenX - worldContainer.x;
            let mouseWorldY = mouse.screenY - worldContainer.y;

            // 3. Aktualizujemy gracza
            player.update(keys, mouseWorldX, mouseWorldY);
        });
