<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekstra Tanks: WebGL Edition</title>
    
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #1a1a2e; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
</head>
<body>

    <script>
        // ==========================================
        // ETAP 1: INICJALIZACJA SILNIKA
        // ==========================================
        const app = new PIXI.Application({
            resizeTo: window,          
            backgroundColor: 0x1a1a2e, 
            antialias: true            
        });

        document.body.appendChild(app.view);
        app.view.style.position = 'absolute';
        app.view.style.zIndex = '1';

        const worldContainer = new PIXI.Container();
        worldContainer.sortableChildren = true; 
        app.stage.addChild(worldContainer);

        // ==========================================
        // ETAP 2: GRACZ
        // ==========================================
        class Player {
            constructor() {
                this.x = window.innerWidth / 2;
                this.y = window.innerHeight / 2;
                this.speed = 6;
                
                this.container = new PIXI.Container();
                this.container.x = this.x;
                this.container.y = this.y;
                
                this.hull = new PIXI.Graphics();
                this.hull.beginFill(0x111111);
                this.hull.drawRect(-23, -23, 46, 10);
                this.hull.drawRect(-23, 13, 46, 10);
                this.hull.beginFill(0x27ae60);
                this.hull.drawRoundedRect(-23, -19, 46, 38, 8);
                this.hull.endFill();
                
                this.turret = new PIXI.Graphics();
                this.turret.beginFill(0x555555);
                this.turret.drawRect(10, -6, 25, 12);
                this.turret.beginFill(0x27ae60);
                this.turret.drawCircle(0, 0, 16);
                this.turret.endFill();
                
                this.container.addChild(this.hull);
                this.container.addChild(this.turret);
                worldContainer.addChild(this.container);
            }

            update(keys, mouseWorldX, mouseWorldY) {
                let dx = 0; let dy = 0;
                if (keys.w) dy -= 1;
                if (keys.s) dy += 1;
                if (keys.a) dx -= 1;
                if (keys.d) dx += 1;

                if (dx !== 0 || dy !== 0) {
                    let len = Math.sqrt(dx * dx + dy * dy);
                    this.x += (dx / len) * this.speed;
                    this.y += (dy / len) * this.speed;
                    this.hull.rotation = Math.atan2(dy, dx);
                }

                this.container.x = this.x;
                this.container.y = this.y;
                this.turret.rotation = Math.atan2(mouseWorldY - this.y, mouseWorldX - this.x);
                this.container.zIndex = this.y + 19; 
            }
        }

        // ==========================================
        // TŁO I BUDYNKI (ŚRODOWISKO)
        // ==========================================
        const grid = new PIXI.Graphics();
        grid.lineStyle(2, 0x333344, 0.5); 
        for(let i = -2000; i <= 4000; i += 100) {
            grid.moveTo(i, -2000); grid.lineTo(i, 4000);
            grid.moveTo(-2000, i); grid.lineTo(4000, i);
        }
        worldContainer.addChild(grid);
        
        class CyberWall {
            constructor(x, y, width, height) {
                this.container = new PIXI.Container();
                this.container.x = x;
                this.container.y = y;
                this.container.zIndex = y + height;

                this.gfx = new PIXI.Graphics();
                this.gfx.beginFill(0x2c3e50);
                this.gfx.drawRect(0, 0, width, height);
                this.gfx.lineStyle(4, 0x34495e);
                this.gfx.drawRect(2, 2, width-4, height-4);
                this.gfx.endFill();

                this.container.addChild(this.gfx);
                worldContainer.addChild(this.container);
            }
        }

        const walls = [
            new CyberWall(300, 200, 200, 150),
            new CyberWall(600, 500, 100, 300),
            new CyberWall(200, 700, 300, 100)
        ];

        // ==========================================
        // ETAP 5: POCISKI
        // ==========================================
        class Bullet {
            constructor(x, y, angle) {
                this.x = x;
                this.y = y;
                this.vx = Math.cos(angle) * 15; 
                this.vy = Math.sin(angle) * 15;
                this.active = true;
                this.distance = 0; 

                this.gfx = new PIXI.Graphics();
                this.gfx.beginFill(0xffcc00); 
                this.gfx.drawCircle(0, 0, 6);
                this.gfx.endFill();
                
                this.gfx.x = this.x;
                this.gfx.y = this.y;
                this.gfx.zIndex = this.y + 10; 

                worldContainer.addChild(this.gfx);
            }

            update(delta) {
                if (!this.active) return;
                
                this.x += this.vx * delta;
                this.y += this.vy * delta;
                this.gfx.x = this.x;
                this.gfx.y = this.y;
                this.gfx.zIndex = this.y + 10;

                this.distance += 15 * delta;
                if (this.distance > 1000) {
                    this.destroy();
                }
            }
            
            destroy() {
                this.active = false;
                worldContainer.removeChild(this.gfx);
                this.gfx.destroy(); 
            }
        }

        // ==========================================
        // ETAP 6: CZĄSTECZKI
        // ==========================================
        class Particle {
            constructor(x, y, color, speed) {
                this.x = x;
                this.y = y;
                
                let angle = Math.random() * Math.PI * 2;
                let vel = Math.random() * speed;
                this.vx = Math.cos(angle) * vel;
                this.vy = Math.sin(angle) * vel;
                
                this.life = 1.0; 
                this.active = true;
                
                this.gfx = new PIXI.Graphics();
                this.gfx.beginFill(color);
                this.gfx.drawRect(-4, -4, 8, 8); 
                this.gfx.endFill();
                
                this.gfx.x = this.x;
                this.gfx.y = this.y;
                this.gfx.zIndex = this.y + 20; 
                
                worldContainer.addChild(this.gfx);
            }
            
            update(delta) {
                if(!this.active) return;
                
                this.x += this.vx * delta;
                this.y += this.vy * delta;
                this.life -= 0.05 * delta; 
                
                this.gfx.x = this.x;
                this.gfx.y = this.y;
                this.gfx.alpha = Math.max(0, this.life);
                this.gfx.scale.set(Math.max(0, this.life));
                
                if(this.life <= 0) {
                    this.destroy();
                }
            }
            
            destroy() {
                this.active = false;
                worldContainer.removeChild(this.gfx);
                this.gfx.destroy();
            }
        }

        const particles = [];
        function createExplosion(x, y, color, amount) {
            for(let i = 0; i < amount; i++) {
                particles.push(new Particle(x, y, color, 8));
            }
        }

        // ==========================================
        // ETAP 7: WROGOWIE
        // ==========================================
        class Enemy {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.speed = 2 + Math.random() * 2; 
                this.hp = 3; 
                this.active = true;

                this.container = new PIXI.Container();
                this.container.x = this.x;
                this.container.y = this.y;

                this.hull = new PIXI.Graphics();
                this.hull.beginFill(0x111111);
                this.hull.drawRect(-23, -23, 46, 10);
                this.hull.drawRect(-23, 13, 46, 10);
                this.hull.beginFill(0xc0392b); 
                this.hull.drawRoundedRect(-23, -19, 46, 38, 8);
                this.hull.endFill();

                this.turret = new PIXI.Graphics();
                this.turret.beginFill(0x555555);
                this.turret.drawRect(10, -6, 25, 12);
                this.turret.beginFill(0xc0392b);
                this.turret.drawCircle(0, 0, 16);
                this.turret.endFill();

                this.container.addChild(this.hull);
                this.container.addChild(this.turret);
                worldContainer.addChild(this.container);
            }

            update(delta, targetX, targetY) {
                if (!this.active) return;

                let dx = targetX - this.x;
                let dy = targetY - this.y;
                let dist = Math.sqrt(dx * dx + dy * dy);

                if (dist > 60) { 
                    this.x += (dx / dist) * this.speed * delta;
                    this.y += (dy / dist) * this.speed * delta;
                }

                this.hull.rotation = Math.atan2(dy, dx);
                this.turret.rotation = Math.atan2(dy, dx); 

                this.container.x = this.x;
                this.container.y = this.y;
                this.container.zIndex = this.y + 19; 
            }

            takeDamage() {
                this.hp -= 1;
                if (this.hp <= 0) {
                    this.active = false;
                    createExplosion(this.x, this.y, 0xff3300, 30); 
                    worldContainer.removeChild(this.container);
                    this.container.destroy({ children: true }); 
                }
            }
        }

        // Inicjalizacja obiektów gry
        const player = new Player();
        const enemies = [
            new Enemy(1000, 500),
            new Enemy(200, 900),
            new Enemy(-300, 300)
        ];
        const bullets = [];
        
        // ==========================================
        // STEROWANIE
        // ==========================================
        const keys = { w: false, a: false, s: false, d: false };
        const mouse = { screenX: window.innerWidth/2, screenY: window.innerHeight/2 };
        let lastShotTime = 0; 

        window.addEventListener('keydown', e => { 
            let k = e.key.toLowerCase(); if (keys.hasOwnProperty(k)) keys[k] = true; 
        });
        window.addEventListener('keyup', e => { 
            let k = e.key.toLowerCase(); if (keys.hasOwnProperty(k)) keys[k] = false; 
        });
        app.view.addEventListener('pointermove', e => {
            mouse.screenX = e.clientX;
            mouse.screenY = e.clientY;
        });

        app.view.addEventListener('pointerdown', (e) => {
            const now = Date.now();
            if (now - lastShotTime > 250) {
                let angle = player.turret.rotation;
                let startX = player.x + Math.cos(angle) * 35;
                let startY = player.y + Math.sin(angle) * 35;
                
                bullets.push(new Bullet(startX, startY, angle));
                createExplosion(startX, startY, 0xff9900, 15);
                lastShotTime = now;
            }
        });

        // ==========================================
        // GŁÓWNA PĘTLA GRY
        // ==========================================
        app.ticker.add((delta) => {
            // 1. Kamera
            worldContainer.x = ~~(window.innerWidth / 2 - player.x);
            worldContainer.y = ~~(window.innerHeight / 2 - player.y);

            let mouseWorldX = mouse.screenX - worldContainer.x;
            let mouseWorldY = mouse.screenY - worldContainer.y;

            // 2. Aktualizacja gracza
            player.update(keys, mouseWorldX, mouseWorldY);
            
            // 3. Aktualizacja pocisków
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.update(delta);
                if (!b.active) bullets.splice(i, 1);
            }
            
            // 4. Aktualizacja cząsteczek
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update(delta);
                if (!p.active) particles.splice(i, 1);
            }
            
            // 5. Aktualizacja wrogów i kolizje
            for (let i = enemies.length - 1; i >= 0; i--) {
                let enemy = enemies[i];
                enemy.update(delta, player.x, player.y);

                for (let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j];
                    if (!b.active) continue;

                    let dx = b.x - enemy.x;
                    let dy = b.y - enemy.y;
                    
                    if (dx * dx + dy * dy < 30 * 30) {
                        b.destroy(); 
                        bullets.splice(j, 1); 
                        
                        enemy.takeDamage(); 
                        createExplosion(b.x, b.y, 0xffcc00, 5); 
                        break; 
                    }
                }

                if (!enemy.active) {
                    enemies.splice(i, 1);
                }
            }
        });
    </script>
</body>
</html>
